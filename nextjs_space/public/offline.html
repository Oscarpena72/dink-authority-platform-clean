<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#090426">
  <title>Offline — Dink Authority Magazine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #090426;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 420px; }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background: rgba(57, 255, 20, 0.1);
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; color: #39FF14; }
    h1 {
      font-size: 1.75rem; font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }
    .neon { color: #39FF14; }
    p {
      color: rgba(255,255,255,0.5);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #39FF14;
      color: #090426;
      border: none;
      padding: 0.875rem 2rem;
      font-size: 0.875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 5.636a9 9 0 000 12.728M12 12v.01M8.464 15.536a5 5 0 010-7.072M15.536 8.464a5 5 0 010 7.072" />
      </svg>
    </div>
    <h1>DINK AUTHORITY<span class="neon">.</span></h1>
    <p>It looks like you're offline right now. Check your connection and try again — we'll be right here when you're back.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
